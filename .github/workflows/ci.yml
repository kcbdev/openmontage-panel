name: API CI

on:
  push:
    branches: [main]
    paths:
      - "mission-control/api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "mission-control/api/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: mission-control/api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: "mission-control/api/requirements.txt"
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: openmontage
          POSTGRES_USER: openmontage
          POSTGRES_PASSWORD: openmontage
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: "mission-control/api/requirements.txt"
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/acceptance
        env:
          DATABASE_URL: postgresql+asyncpg://openmontage:openmontage@localhost:5432/openmontage
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key

      - name: Run acceptance tests
        run: python -m pytest tests/acceptance/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://openmontage:openmontage@localhost:5432/openmontage
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
