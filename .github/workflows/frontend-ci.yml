name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "mission-control-web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "mission-control-web/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: mission-control-web

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "mission-control-web/package-lock.json"
      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
