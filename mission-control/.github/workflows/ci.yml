name: API CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"

env:
  PYTHON_VERSION: "3.10"
  TEST_API_URL: "http://localhost:8001"
  DB_URL: "postgresql+psycopg://postgres:postgres@localhost/mission_control_test"
  REDIS_URL: "redis://localhost:6379/1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mission_control_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Lint with ruff
        run: ruff check api/ --config api/pyproject.toml

      - name: Start API server
        run: |
          cd api
          nohup fastapi run main.py --port 8001 > /tmp/api.log 2>&1 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health | grep -q "204" && break
            sleep 2
          done
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/health || (echo "Server failed to start"; cat /tmp/api.log; exit 1)

      - name: Run tests
        run: pytest api/tests/ -v --tb=short
        env:
          TEST_API_URL: "http://localhost:8001"
