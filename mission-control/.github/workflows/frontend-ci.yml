name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "mission-control-web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "mission-control-web/**"

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mission-control-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mission-control-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
