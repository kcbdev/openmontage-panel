version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: mission_control
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  mission-control-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql+psycopg://postgres:dev@postgres/mission_control
      REDIS_URL: redis://redis:6379/0
      PROJECTS_DIR: /data/projects
      ENGINE_IMAGE: openmontage-engine:mc-v0
      # Set ENGINE_MODE=real to use the real engine container instead of stub-driver
      STUB_DRIVER: "${ENGINE_MODE:-stub}" != "real"
      STUB_SPEED: fast
    volumes:
      - shared-projects:/data/projects
      - ./openmontage-src/pipeline_defs:/app/pipeline_defs:ro
      - ./api/static:/app/static:ro
    depends_on:
      - postgres
      - redis

  stub-driver:
    profiles: ["stub"]
    build:
      context: .
      dockerfile: stub-driver/Dockerfile
    environment:
      PROJECTS_DIR: /data/projects
      STUB_SPEED: fast
    volumes:
      - shared-projects:/data/projects
    depends_on:
      - mission-control-api

  engine:
    profiles: ["real"]
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      PROJECT_DIR: /data/projects
      STUB_SPEED: fast
    volumes:
      - shared-projects:/data/projects
    depends_on:
      - mission-control-api

volumes:
  pgdata:
  miniodata:
  shared-projects:
